<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Demo Website Toko Kue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff5f7;
        }

        header {
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            color: white;
            text-align: center;
            padding: 30px 15px;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
        }

        header p {
            margin-top: 8px;
            font-size: 14px;
        }

        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin: 10px 0 5px 0;
            color: #ff4d6d;
        }

        .price {
            color: #ff4d6d;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        footer {
            background: #ff4d6d;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <h1>Demo Website Toko Kue</h1>
    <p>Contoh Website Katalog & Pemesanan Online</p>
</header>

<div class="container">

    <div class="card">
        <img src="https://picsum.photos/400/300?random=11" alt="Coklat Premium">
        <div class="card-content">
            <h3>Coklat Premium</h3>
            <p class="price">Mulai dari Rp150.000</p>
            <a class="btn" href="https://wa.me/085253489959">Pesan Sekarang</a>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=12" alt="Red Velvet">
        <div class="card-content">
            <h3>Red Velvet</h3>
            <p class="price">Mulai dari Rp170.000</p>
            <a class="btn" href="https://wa.me/085253489959">Pesan Sekarang</a>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?random=13" alt="Custom Cake">
        <div class="card-content">
            <h3>Custom Birthday Cake</h3>
            <p class="price">Mulai dari Rp200.000</p>
            <a class="btn" href="https://wa.me/085253489959">Pesan Sekarang</a>
        </div>
    </div>

</div>

<footer>
    Lokasi: Ende, NTT <br>
    Buka setiap hari | 08.00 - 21.00
</footer>

</body>
  </html>
